services:
  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: mysql-${MYSQL_VERSION}
    #使用该参数，container内的root拥有真正的root权限，否则，container内的root只是外部的一个普通用户权限
    #设置为true，不然数据卷可能挂载不了，启动不起
    privileged: true
    restart: always
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASS: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      --wait_timeout=31536000
      --interactive_timeout=31536000
      --max_connections=1000
      --default-authentication-plugin=mysql_native_password
    volumes:
      #映射mysql的数据目录到宿主机，保存数据
      - "./mysql/data:/var/lib/mysql"
      #根据宿主机下的配置文件创建容器
      - "./mysql/config/my.cnf:/etc/mysql/my.cnf"
  redis:
      image: redis:6.0.9-buster
      container_name: redis
      restart: always
      ports:
        - "${REDIS_PORT}:6379"
      volumes:
        - ./redis/redis.conf:/etc/redis/redis.conf:rw
        - ./redis/redis-server.log:/var/log/redis/redis-server.log:rw
        - ./redis/data:/data:rw
      command:
        # 执行的命令
        redis-server /etc/redis/redis.conf --appendonly yes
  mongo:
      image: mongo:4.4.2
      restart: unless-stopped
      container_name: mongodb
      environment:
        TZ: 'Asia/Shanghai'
        #用户名密码
        MONGO_INITDB_ROOT_USERNAME: 'admin'
        MONGO_INITDB_ROOT_PASSWORD: 'admin123'
      ports:
        - "${MONGO_PORT:-27017}:27017"
      volumes:
        - ./mongo:/data/db
  elasticsearch:
    build:
      context: ./elasticsearch
      args:
        STACK_VERSION: ${STACK_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=true  # 可选，关闭安全认证（测试用）
      - xpack.security.http.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false  # 关闭磁盘水位检查（测试环境用）
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    volumes:
      - ./elasticsearch/esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - elastic
    ports:
      - "${ES_PORT}:9200"
      - "${ES_TRANSPORT_PORT}:9300"  
    command: >
      bash -c '
        # 检查环境变量是否设置
        if [ -z "$${ELASTIC_PASSWORD}" ]; then
          echo "ERROR: ELASTIC_PASSWORD must be set in .env file";
          exit 1;
        fi;
        if [ -z "$${KIBANA_PASSWORD}" ]; then
          echo "ERROR: KIBANA_PASSWORD must be set in .env file";
          exit 1;
        fi;
        
        # 启动 Elasticsearch 并等待服务就绪
        /usr/local/bin/docker-entrypoint.sh eswrapper &

        # 等待 Elasticsearch HTTP 端口可用
        echo "Waiting for Elasticsearch to start...";
        while ! curl -s http://localhost:9200; do sleep 30; done;

        # 设置 kibana_system 密码
        echo "Setting password for kibana_system...";
        curl -s -X POST -u "elastic:$${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          "http://localhost:9200/_security/user/kibana_system/_password" \
          -d "{\"password\":\"$${KIBANA_PASSWORD}\"}"
        echo "All done!";
        # 保持容器运行
        wait
      '      
    healthcheck:
      # test: ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE 'yellow|green'"]
      interval: 10s
      timeout: 10s
      retries: 30
  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    volumes:  
      - ./kibana/data:/usr/share/kibana/data  
    networks:
      - elastic
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${KIBANA_PORT}:5601"
  kafka:
    image: apache/kafka:${KAFKA_VERSION:-4.0}
    container_name: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    networks:
      - kafka-network
    volumes:
      - "./kafka_data:/tmp/kraft-combined-logs"  # 仅修改数据挂载路径（适配官方镜像）
    environment:
      # 新增：必须显式指定 CLUSTER_ID（解决核心报错）
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
      # KRaft 核心配置（保留你的原有逻辑，仅调整变量名格式）
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Listeners 配置（完全复用你的原有配置）
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://host.docker.internal:9092 mac 可用 
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # 新增：禁用 ZooKeeper（强制使用 KRaft）
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    networks:
      - kafka-network
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092 
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: etcd
    restart: always
    ports:
      - "2379:2379"
    volumes:
      - ./etcd/data:/etcd-data
    # 纯单机模式，无集群参数，最简单稳定
    command:
      - /usr/local/bin/etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --log-level=info
    networks:
      - etcd-network
  etcdkeeper:
    image: evildecay/etcdkeeper:latest
    container_name: etcdkeeper
    restart: always
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - etcd-network  # 加入同一个网络
    depends_on:
      - etcd  # 等etcd启动后再启动
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: apisix-dashboard
    restart: always
    depends_on:
      - etcd
    volumes:
      - ./apisix-dashboard/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml
    ports:
      - "9000:9000"
    networks:
      apisix-network:

  apisix:
    image: apache/apisix:${APISIX_IMAGE_TAG:-3.2.0-debian}
    container_name: apisix
    restart: always
    depends_on:
      - etcd
      - apisix-dashboard
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./apisix/logs:/usr/local/apisix/logs
    ports:
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9443:9443/tcp"
      - "9093:9092/tcp"
    networks:
      apisix-network:
  sail:
    image: ccr.ccs.tencentyun.com/hyy-yu/sail:latest
    container_name: sail
    ports:
      - "8108:8108"
    volumes:
      - "./sail/compose-cfg.toml:/app/cfg.toml"
    restart: always
    platform: linux/arm64

networks:
  elastic:
    driver: bridge
  kafka-network:
    driver: bridge
  etcd-network:
    driver: bridge
  apisix-network:
    driver: bridge