apisix:
  node_listen: 9080              # APISIX 监听端口
  enable_ipv6: false

  # 允许通过 Admin API 修改配置
  allow_admin:
    - 0.0.0.0/0                  # 生产环境建议限制 IP

  # 插件热加载配置
  plugin_attr:
    prometheus:
      export_addr:
        ip: 0.0.0.0
        port: 9091

deployment:
  admin:
    allow_admin:
      - 0.0.0.0/0
    admin_key:
      - name: "admin"
        key: edd1c9f034335f136f87ad84b625c8f1  # 默认 Admin Token
        role: admin

  etcd:
    # 注意：这里必须使用 Docker Compose 的服务名 "etcd"
    host:
      - "http://etcd:2379"
    prefix: "/apisix"            # etcd 中的 key 前缀
    timeout: 30
