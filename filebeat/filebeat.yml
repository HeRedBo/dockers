###########################################################
# Filebeat 终极基础配置模板
# 功能：控制台实时输出 + 同步 Elasticsearch
# 适用：Docker / Windows / Mac / Linux
###########################################################

# ========================== 【一、日志输入配置】 ==========================

filebeat.inputs:

  - type: filestream
    enabled: true
    paths:
      # - /logs/apisix/access-*.log
      - /logs/apisix/access.log
    fields:
      service: apisix  # 标记服务名
      log_type: access
    fields_under_root: true

  # ======================
  # 2. APISIX 错误日志 error.log
  # ======================
  - type: filestream
    enabled: true
    # 🔥 关键：支持 APISIX 按天切割的日志文件
    paths:
      - /logs/apisix/error.log
      # - /logs/apisix/error-*.log
    fields:
      service: apisix 
      log_type: error
    fields_under_root: true


  # ======================
  # 3. MySQL 日志
  # ======================
  # 2. MySQL 日志 demo 
  # - type: filestream
  #   enabled: true
  #   paths:
  #     - /logs/mysql/*.log
  #   fields:
  #     service: mysql
  #     log_type: sql
  #   fields_under_root: true


# ========================== 【二、通用配置】 ==========================
# 关闭自动管理索引（开发环境更简单）
setup.ilm.enabled: false
setup.template.enabled: false
setup.management.enabled: false

# ========================== 【三、双输出配置】 ==========================

# 1. 输出到控制台（开发实时查看用）
# 启动命令：docker logs -f filebeat
# output.console:
#   enabled: true
#   pretty: true  # 格式化输出，好看

# 2. 输出到 Elasticsearch（存储+查询用）
# ✅ 核心：自动根据 index_prefix 分到不同索引
output.elasticsearch:
  enabled: true
  hosts: ["http://elasticsearch:9200"]
  indices:
    # - index: "apisix_access_logs-%{+yyyy.MM.dd}" # 按天切割日志
    - index: "apisix_access_logs"
      when:
        and:
          - equals:
              service: "apisix"
          - equals:
              log_type: "access"
    - index: "apisix_error_logs"
      when:
        and:
          - equals:
              service: "apisix"
          - equals:
              log_type: "error"
  index: "filebeat_unknown_logs"  # 兜底索引 避免出现 null 索引问题
   # ✅ 这里加 ES 账号密码
  username: "elastic"        # 默认账号
  password: "${ELASTIC_PASSWORD}"

# ========================== 【四、日志级别】 ==========================
logging.level: info
logging.selectors: ["*"]
logging.metrics.enabled: false
