input {
  beats {
    port => 5044
  }
  # 简单的 TCP 输入用于测试
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # 在这里添加过滤器，例如解析 JSON
  if [type] == "json" {
    json {
      source => "message"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"] # 如果 ES 没开 SSL，改为 http
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl => false # 如果 ES 没开 SSL，改为 false
    ssl_certificate_verification => false # 跳过证书验证
    index => "logstash-%{+YYYY.MM.dd}"
  }
  # 调试用：输出到控制台
  stdout { codec => rubydebug }
}